AWSTemplateFormatVersion: '2010-09-09'
Description: S3 upload triggers Lambda, built with CloudFormation

Resources:
  UploadBucket:
    Type: AWS::S3::Bucket
    DependsOn: LambdaInvokePermission
    Properties:
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt FileLoggerFunction.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub file-logger-role-${AWS::StackName}-${AWS::Region}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: lambda-logs-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  FileLoggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub file-logger-${AWS::StackName}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import json
          import urllib.parse

          def lambda_handler(event, context):
              print("Full event:")
              print(json.dumps(event))

              for record in event.get("Records", []):
                  bucket = record["s3"]["bucket"]["name"]
                  key = urllib.parse.unquote_plus(record["s3"]["object"]["key"])
                  event_time = record["eventTime"]

                  print(f"Bucket: {bucket}")
                  print(f"File uploaded: {key}")
                  print(f"Event time: {event_time}")

              return {
                  "statusCode": 200,
                  "body": json.dumps("S3 event processed successfully")
              }

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref FileLoggerFunction
      Principal: s3.amazonaws.com

Outputs:
  BucketName:
    Description: Name of the S3 bucket
    Value: !Ref UploadBucket

  LambdaName:
    Description: Name of the Lambda function
    Value: !Ref FileLoggerFunction